# By Heart — corpus manifest (public-domain allowlist)
#
# The provenance_gate node loads THIS file as the single source of truth.
# A poem is eligible iff it has an entry here. Every entry must be a US work
# first published in or before 1930, with a verifiable source. Fail closed:
# anything not listed is refused. See .claude/skills/provenance-gate/SKILL.md.
#
# Required fields per entry: id, title, author, first_published, source_url, rights.

poems:
  - id: frost-stopping-by-woods
    title: "Stopping by Woods on a Snowy Evening"
    author: "Robert Frost"
    first_published: 1923
    source_url: "https://www.gutenberg.org/ebooks/58611"
    rights: public-domain-US
    text_file: texts/frost-stopping-by-woods.txt
    sha256: f46845b325148c39a0633fca17de8aae08a1f048edbd98456a2846a35c6c8330
    notes: "First published in the collection New Hampshire (1923); Gutenberg ebook 58611. Body-only (title line omitted)."

  - id: dickinson-because-i-could-not-stop-for-death
    title: "Because I could not stop for Death"
    author: "Emily Dickinson"
    first_published: 1890
    source_url: "https://www.gutenberg.org/ebooks/12242"
    rights: public-domain-US
    text_file: texts/dickinson-because-i-could-not-stop-for-death.txt
    sha256: fe0a7bffeb75412b66c7b23b8be485c00555b76b0fb28d5eba11b6b8d9a914f7
    notes: >-
      Written c. 1863; first published (as 'The Chariot') in Poems by Emily
      Dickinson, edited by Higginson and Todd, 1890. Body-only; this is the
      regularized 1890 5-stanza text (omits the 'Or rather, he passed us' stanza).

  - id: whitman-o-captain-my-captain
    title: "O Captain! My Captain!"
    author: "Walt Whitman"
    first_published: 1865
    source_url: "https://www.gutenberg.org/ebooks/1322"
    rights: public-domain-US
    text_file: texts/whitman-o-captain-my-captain.txt
    sha256: 0b23da7e25a2aa335a2dc986ae446166c1a7aee031888293f1af2dc58b5e68f8
    notes: "First published in Sequel to Drum-Taps (1865); collected in Leaves of Grass. Body-only; deathbed-edition text."

  - id: lazarus-the-new-colossus
    title: "The New Colossus"
    author: "Emma Lazarus"
    first_published: 1883
    source_url: "https://en.wikisource.org/wiki/The_New_Colossus"
    rights: public-domain-US
    text_file: texts/lazarus-the-new-colossus.txt
    sha256: 1812375b476fb06c2f04eaf29463f6fed133262c0fd91998e2c654960711f95a
    notes: >-
      Petrarchan sonnet written in 1883 for the Bartholdi Pedestal Fund (the
      campaign to fund the Statue of Liberty's pedestal); the closing lines were
      cast on a bronze plaque mounted inside the statue's base in 1903. Body-only;
      octave + sestet layout. Public domain in the US (first published 1883).

  - id: kilmer-trees
    title: "Trees"
    author: "Joyce Kilmer"
    first_published: 1913
    source_url: "https://en.wikisource.org/wiki/Trees_(Kilmer)"
    rights: public-domain-US
    text_file: texts/kilmer-trees.txt
    sha256: 52e901bb097ba093b24fa2062ea3573c0cdcf94ca5cecdcf5bfd0ebb640f4924
    notes: >-
      First published in Poetry magazine (August 1913); collected in Trees and
      Other Poems (1914). Body-only; six rhymed couplets. Public domain in the US
      (first published 1913).
